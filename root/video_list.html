<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>视频列表</title>
<style>
body{
    background:#f5f6fa;
    font-family: Arial, Helvetica, sans-serif;
}

.container{
    width:80%;
    margin:40px auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.video-card{
    display: inline-block;
    width: 30%;
    margin: 10px;
    padding: 20px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    text-align:center;
}

.video-card img{
    width:100%;
    height:200px;
    object-fit: cover;
    border-radius:8px;
}

.video-card .title{
    font-size:18px;
    margin: 10px 0;
}

.video-card a{
    color: #409eff;
    text-decoration: none;
}

.video-card a:hover{
    text-decoration: underline;
}
</style>
</head>
<body>

<div class="container">

<h1>视频列表</h1>

<div id="video-list">
    <!-- 视频卡片会动态填充到这里 -->
</div>

<script>
// 动态填充视频列表
const videoListHtml = `{{video_list_html}}`;  // 用后端传过来的视频列表替换这里
document.getElementById('video-list').innerHTML = videoListHtml;
</script>

</div>

</body>
</html>
