<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>视频播放</title>

<style>
body{
    background:#f5f6fa;
    font-family: Arial, Helvetica, sans-serif;
}

.container{
    width:80%;
    margin:40px auto;
}

video{
    width:100%;
    height:450px;
    background:black;
    border-radius:8px;
}

.comments{
    margin-top: 30px;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

.comment{
    padding: 10px;
    border-bottom: 1px solid #eee;
}

.comment:last-child{
    border-bottom: none;
}

textarea{
    width: 100%;
    height: 100px;
    padding: 10px;
    margin: 20px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button{
    background:#409eff;
    color:white;
    border:none;
    padding:10px 20px;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2f88e6;
}
</style>

</head>
<body>

<div class="container">

<video controls>
    <source id="video-player" src="" type="video/mp4">
</video>

<h3>评论区</h3>

<!-- 评论区 -->
<div class="comments" id="comments-section"></div>

<textarea id="comment-input" placeholder="写下你的评论..."></textarea>
<button id="submit-comment">发表评论</button>

</div>

<script>
// 获取 URL 参数
const params = new URLSearchParams(location.search);
const videoFilename = params.get('video');

// 设置视频源
document.getElementById('video-player').src = `/videos/${videoFilename}`;

// 动态加载评论
const comments = [
    {user: "用户1", content: "不错的影片！"},
    {user: "用户2", content: "很喜欢这个视频！"},
    {user: "用户3", content: "精彩！"}
];

let commentHtml = '';
comments.forEach(comment => {
    commentHtml += `
        <div class="comment">
            <strong>${comment.user}</strong>: ${comment.content}
        </div>
    `;
});

document.getElementById('comments-section').innerHTML = commentHtml;

// 提交评论
document.getElementById('submit-comment').addEventListener('click', function() {
    const commentText = document.getElementById('comment-input').value;
    if (commentText) {
        // 在这里提交评论到服务器并更新评论区
        alert('评论已提交: ' + commentText);
        // 重置评论框
        document.getElementById('comment-input').value = '';
    }
});
</script>

</body>
</html>
